<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Rede Social</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <main class="container">
    <div class="grid">
      <div></div>
      <div style="margin-top: 2rem;">
        <article>
          <header>
            <h1>Criar conta</h1>
            <p>Preencha todos os campos abaixo</p>
          </header>
          <form action="feed.html" method="get">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome" required>

            <label for="email_cad">E-mail</label>
            <input type="email" id="email_cad" name="email_cad" placeholder="contato@exemplo.com" required>

            <label for="usuario">Usuário</label>
            <input type="text" id="usuario" name="usuario" placeholder="@username" required>

            <label for="senha_cad">Senha</label>
            <input type="password" id="senha_cad" name="senha_cad" required>

            <label for="confirma_senha">Confirmar senha</label>
            <input type="password" id="confirma_senha" name="confirma_senha" required>

            <label for="genero">Gênero</label>
            <select id="genero" name="genero" required>
              <option value="" disabled selected>Selecione</option>
              <option>Feminino</option>
              <option>Masculino</option>
              <option>Outro</option>
            </select>

            <label for="nascimento">Data de nascimento</label>
            <input type="date" id="nascimento" name="nascimento" required>

            <button type="submit" class="primary">Cadastrar</button>
          </form>
          <footer style="margin-top: 1rem; text-align: center;">
            <a href="index.html">← Já possuo uma conta</a>
          </footer>
        </article>
      </div>
      <div></div>
    </div>
  </main>
</body>
</html>
